<head>
  <meta charset="UTF-8" />

  <title>Login & Signup Form</title>
  <link rel="stylesheet" href="css/style_login.css" />
</head>

<body>
  <section class="wrapper">
    <div class="form signup">
      <header>Clash of Students</header>
      <form action="/question" method="get">
        <input type="text" id="email" name="email" placeholder="HHZ Email address" required />
        <input type="password" id="password" name="password" placeholder="Password" required />
        <a href="https://letmegooglethat.com/?q=Wie+kann+ich+mir+meine+Passw%C3%B6rter+merken%3F">Forgot password?</a>
        <input type="submit" value="Login" />
      </form>
    </div>

    <div class="form login">
      <header>Professors Hub</header>
      <form action="/students" method="get" >
        <input type="text" name="email" placeholder="HHZ Email address" required />
        <input type="password" name="password" placeholder="Password" required />
        <a href="https://letmegooglethat.com/?q=Wie+kann+ich+mir+meine+Passw%C3%B6rter+merken%3F">Forgot password?</a>
        <input type="submit" value="Login"/>
      </form>
    </div>

    <script>
      const wrapper = document.querySelector(".wrapper"),
        signupHeader = document.querySelector(".signup header"),
        loginHeader = document.querySelector(".login header");

      loginHeader.addEventListener("click", () => {
        wrapper.classList.add("active");
        document.body.classList.add('background-signup');
        document.body.classList.remove('background-login');
      });

      signupHeader.addEventListener("click", () => {
        wrapper.classList.remove("active");
        document.body.classList.add('background-login');
        document.body.classList.remove('background-signup');
      });

  </section>
